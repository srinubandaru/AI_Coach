<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden;
        }
        .container {
            width: 90%; max-width: 850px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px; padding: 50px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative; z-index: 10;
        }
        .header { text-align: center; margin-bottom: 30px; }
        h1 {
            font-weight: 600; font-size: 3rem; margin: 0;
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            background-clip: text; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; letter-spacing: -1px;
        }
        .status-badge {
            display: inline-block;
            background: rgba(0, 242, 254, 0.15); color: #00f2fe;
            padding: 8px 20px; border-radius: 30px;
            font-size: 1rem; font-weight: 600; margin-top: 20px;
            border: 1px solid rgba(0, 242, 254, 0.3); transition: all 0.4s ease;
        }
        .status-badge.listening {
            background: rgba(46, 204, 113, 0.15); color: #2ecc71;
            border-color: rgba(46, 204, 113, 0.3); animation: pulse-green 2s infinite;
        }
        .status-badge.generating {
            background: rgba(155, 89, 182, 0.15); color: #9b59b6;
            border-color: rgba(155, 89, 182, 0.3); animation: pulse-purple 2s infinite;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(46, 204, 113, 0); }
            100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }
        @keyframes pulse-purple {
            0% { box-shadow: 0 0 0 0 rgba(155, 89, 182, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(155, 89, 182, 0); }
            100% { box-shadow: 0 0 0 0 rgba(155, 89, 182, 0); }
        }
        .content-area {
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px; padding: 30px; min-height: 250px;
            font-size: 1.15rem; line-height: 1.7; color: #f8fafc;
            transition: all 0.3s ease; white-space: pre-wrap; margin-top: 20px;
        }
        .setup-area {
            display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;
        }
        input[type="password"] {
            padding: 12px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.4); color: white; width: 300px;
        }
        button {
            padding: 12px 24px; border-radius: 8px; border: none;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: #0f2027; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .controls { text-align: center; margin-top: 15px; }

        .shape { position: absolute; filter: blur(90px); z-index: -1; border-radius: 50%; }
        .shape-1 { top: -150px; left: -150px; width: 400px; height: 400px; background: #4facfe; opacity: 0.3; }
        .shape-2 { bottom: -150px; right: -150px; width: 500px; height: 500px; background: #00f2fe; opacity: 0.2; }
    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="container">
        <div class="header">
            <h1>AI Interview Coach</h1>
            <div id="status" class="status-badge">Waiting for Setup</div>
        </div>
        
        <div id="setup" class="setup-area">
            <input type="password" id="apiKey" placeholder="Enter OpenAI API Key (sk-...)">
            <button id="startBtn">Start Listening</button>
        </div>

        <div id="output" class="content-area">Enter your OpenAI API secret key above and click Start. Your key never leaves your browser.</div>
        
        <div class="controls" id="controls" style="display: none;">
            <button id="stopBtn" style="background:#e74c3c; color:white;">Stop Mic</button>
        </div>
    </div>

    <script>
        const API_CHECK_REGEX = /\b(what|how|why|tell|describe|explain|can you|could you|would you)\b/i;
        
        let recognition;
        let isActive = false;
        let openaiKey = '';
        
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('output');
        const setupEl = document.getElementById('setup');
        const controlsEl = document.getElementById('controls');
        
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            outputEl.innerHTML = "Your browser does not support the Web Speech API. Please use Google Chrome.";
        } else {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                setStatus("🎤 Listening...", "listening");
            };

            recognition.onresult = async function(event) {
                const text = event.results[0][0].transcript.trim();
                console.log("Heard: ", text);
                
                if (API_CHECK_REGEX.test(text) || text.includes('?')) {
                    setStatus("🤖 Generating guidance...", "generating");
                    outputEl.innerText = `Question detected: "${text}"\n\nAnalyzing via OpenAI...`;
                    await fetchGuidance(text);
                } else {
                    outputEl.innerText = `Heard: "${text}"\n(Not detected as a question, continuing to listen...)`;
                    if (isActive) recognition.start();
                }
            };

            recognition.onerror = function(event) {
                console.error("Speech error: " + event.error);
                if(event.error === 'no-speech' && isActive) {
                    recognition.start();
                } else {
                    setStatus("Error: " + event.error, "");
                }
            };

            recognition.onend = function() {
                if (isActive && !statusEl.classList.contains("generating")) {
                    recognition.start();
                }
            };
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            const keyVal = document.getElementById('apiKey').value.trim();
            if(!keyVal.startsWith('sk-')) {
                alert("Please enter a valid OpenAI API key starting with sk-");
                return;
            }
            openaiKey = keyVal;
            isActive = true;
            setupEl.style.display = 'none';
            controlsEl.style.display = 'block';
            outputEl.innerText = "Microphone activated. Start speaking!";
            recognition.start();
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            isActive = false;
            recognition.stop();
            setupEl.style.display = 'flex';
            controlsEl.style.display = 'none';
            setStatus("Disconnected", "");
            outputEl.innerText = "Engine stopped.";
        });

        function setStatus(text, type) {
            statusEl.innerText = text;
            statusEl.classList.remove("listening", "generating");
            if(type) statusEl.classList.add(type);
        }

        async function fetchGuidance(question) {
            const prompt = `You are an expert AI Interview Coach.
The candidate has just been asked the following interview question:
"${question}"

Your job is to provide a COMPLETE, REALISTIC, AND HIGH-QUALITY example answer that the candidate can use as inspiration or adapt on the fly. 
STRICT RULES:
- Provide a direct, realistic answer to the question.
- Write it in the first person ("I").
- Structure the realistic answer using the STAR method naturally.
- Keep the length to a concise speaking length (around 100-150 words).
- Do NOT output formatting fluff, just provide the answer.

Format:
[Realistic Answer]
<The full first-person response>

[Pro-Tip]
<One quick tip on delivery>`;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${openaiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o',
                        messages: [{role: 'user', content: prompt}]
                    })
                });
                
                const data = await response.json();
                if(data.error) {
                    outputEl.innerText = `OpenAI API Error: ${data.error.message}`;
                } else {
                    const guidance = data.choices[0].message.content;
                    outputEl.innerText = `Question detected: "${question}"\n\n---\n\n${guidance}`;
                }
            } catch (err) {
                outputEl.innerText = `Network Error: Could not connect to OpenAI.`;
            }
            
            if (isActive) {
                setTimeout(() => recognition.start(), 1000);
            }
        }
    </script>
</body>
</html>
